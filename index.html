<!DOCTYPE html>
<html>
<head>
    <title>Canvas API Exercise</title>

    <style>
        #myCanvas {
            width: 400px;
            height: 400px;
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <canvas id="myCanvas" width="400" height="400"></canvas>

    <script>

        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        ctx.beginPath();
        ctx.arc(100, 100, 20, 0, Math.PI);
        ctx.stroke();

        ctx.beginPath();
        ctx.rect(80, 30, 150, 100);
        ctx.stroke();

        ctx.font = "30px Arial";
        ctx.strokeText("Canvas API!", 40, 200);
    </script>

</body>
</html>
